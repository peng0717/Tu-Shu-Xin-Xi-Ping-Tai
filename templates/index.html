<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书信息一体化平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 250px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 0;
            color: white;
        }
        .sidebar h4 { padding: 0 20px; margin-bottom: 30px; }
        .sidebar a {
            color: rgba(255,255,255,0.8);
            padding: 12px 20px;
            display: block;
            text-decoration: none;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            color: white;
            background: rgba(255,255,255,0.1);
        }
        .sidebar a i { margin-right: 10px; }
        .content { margin-left: 250px; padding: 20px; }
        .card-stat {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }
        .card-stat:hover { transform: translateY(-5px); }
        .card-stat .icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .bg-gradient-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .bg-gradient-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .bg-gradient-warning { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .bg-gradient-info { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4><i class="bi bi-book"></i> 图书馆管理</h4>
        <a href="/admin" class="active"><i class="bi bi-speedometer2"></i> 仪表盘</a>
        <a href="/admin/books"><i class="bi bi-book"></i> 图书管理</a>
        <a href="/admin/borrows"><i class="bi bi-arrow-left-right"></i> 借还管理</a>
        <a href="/admin/users"><i class="bi bi-people"></i> 读者管理</a>
        <a href="/admin/reservations"><i class="bi bi-calendar-check"></i> 预约管理</a>
        <a href="/admin/notices"><i class="bi bi-megaphone"></i> 公告管理</a>
        <a href="/admin/stats"><i class="bi bi-bar-chart"></i> 统计报表</a>
        <a href="/"><i class="bi bi-house"></i> 返回首页</a>
    </div>
    
    <div class="content">
        <div class="container-fluid">
            <h2 class="mb-4">欢迎使用图书信息管理平台</h2>
            
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card card-stat p-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted mb-2">图书总数</h6>
                                <h3 class="mb-0" id="totalBooks">-</h3>
                            </div>
                            <div class="icon bg-gradient-primary text-white">
                                <i class="bi bi-book"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card card-stat p-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted mb-2">在馆图书</h6>
                                <h3 class="mb-0" id="availableBooks">-</h3>
                            </div>
                            <div class="icon bg-gradient-success text-white">
                                <i class="bi bi-check-circle"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card card-stat p-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted mb-2">读者总数</h6>
                                <h3 class="mb-0" id="totalUsers">-</h3>
                            </div>
                            <div class="icon bg-gradient-info text-white">
                                <i class="bi bi-people"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card card-stat p-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted mb-2">逾期未还</h6>
                                <h3 class="mb-0" id="overdueCount">-</h3>
                            </div>
                            <div class="icon bg-gradient-warning text-white">
                                <i class="bi bi-exclamation-triangle"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0"><i class="bi bi-lightning"></i> 快捷操作</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-6">
                                    <a href="/admin/books" class="btn btn-outline-primary w-100 py-3">
                                        <i class="bi bi-plus-circle d-block fs-3 mb-2"></i>
                                        添加图书
                                    </a>
                                </div>
                                <div class="col-6">
                                    <a href="/admin/borrows" class="btn btn-outline-success w-100 py-3">
                                        <i class="bi bi-arrow-left-right d-block fs-3 mb-2"></i>
                                        借还办理
                                    </a>
                                </div>
                                <div class="col-6">
                                    <a href="/admin/users" class="btn btn-outline-info w-100 py-3">
                                        <i class="bi bi-person-plus d-block fs-3 mb-2"></i>
                                        添加读者
                                    </a>
                                </div>
                                <div class="col-6">
                                    <a href="/admin/notices" class="btn btn-outline-warning w-100 py-3">
                                        <i class="bi bi-megaphone d-block fs-3 mb-2"></i>
                                        发布公告
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0"><i class="bi bi-clock-history"></i> 借阅动态</h5>
                        </div>
                        <div class="card-body" id="recentActivity">
                            <div class="text-center text-muted">
                                <i class="bi bi-hourglass-split fs-1"></i>
                                <p class="mt-2">加载中...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="row mt-4">
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0"><i class="bi bi-fire"></i> 热门图书 TOP 5</h5>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover">
                                    <thead>
                                        <tr>
                                            <th>书名</th>
                                            <th>作者</th>
                                            <th>借阅次数</th>
                                            <th>在架数量</th>
                                        </tr>
                                    </thead>
                                    <tbody id="hotBooks">
                                        <tr><td colspan="4" class="text-center text-muted">加载中...</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const API_BASE = '/api';
        
        // 加载仪表盘数据
        async function loadDashboard() {
            try {
                // 获取统计数据
                const statsRes = await axios.get(`${API_BASE}/stats/dashboard`);
                const stats = statsRes.data;
                
                document.getElementById('totalBooks').textContent = stats.total_books || 0;
                document.getElementById('availableBooks').textContent = stats.available_books || 0;
                document.getElementById('totalUsers').textContent = stats.total_users || 0;
                document.getElementById('overdueCount').textContent = stats.overdue_count || 0;
                
                // 获取借阅趋势
                const trendRes = await axios.get(`${API_BASE}/stats/borrow-trend`);
                const trend = trendRes.data.trend || [];
                
                let html = '';
                trend.slice(-5).reverse().forEach(day => {
                    html += `<div class="d-flex justify-content-between py-2 border-bottom">
                        <span>${day.date}</span>
                        <span class="text-success">借 ${day.borrows}</span>
                        <span class="text-primary">还 ${day.returns}</span>
                    </div>`;
                });
                document.getElementById('recentActivity').innerHTML = html || '<p class="text-muted">暂无数据</p>';
                
                // 获取热门图书
                const hotRes = await axios.get(`${API_BASE}/stats/hot-books?limit=5`);
                const hotBooks = hotRes.data.hot_books || [];
                
                let booksHtml = '';
                hotBooks.forEach(book => {
                    booksHtml += `<tr>
                        <td>${book.title}</td>
                        <td>${book.author || '-'}</td>
                        <td><span class="badge bg-primary">${book.borrow_count}</span></td>
                        <td>${book.available_count} / ${book.total_count}</td>
                    </tr>`;
                });
                document.getElementById('hotBooks').innerHTML = booksHtml || '<tr><td colspan="4" class="text-center text-muted">暂无数据</td></tr>';
                
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }
        
        // 页面加载完成后获取数据
        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
