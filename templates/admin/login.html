<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 图书信息平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .login-left {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 60px 40px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .login-right {
            padding: 60px 40px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
        }
        .btn-login:hover {
            opacity: 0.9;
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-card" style="max-width: 900px; width: 90%;">
        <div class="row g-0">
            <div class="col-md-5 login-left">
                <h2 class="mb-4"><i class="bi bi-book"></i> 图书信息平台</h2>
                <p class="mb-4">图书信息一体化管理平台，让图书馆管理更高效、更便捷。</p>
                <div>
                    <p class="mb-2"><i class="bi bi-check-circle me-2"></i>图书管理</p>
                    <p class="mb-2"><i class="bi bi-check-circle me-2"></i>借还管理</p>
                    <p class="mb-2"><i class="bi bi-check-circle me-2"></i>读者管理</p>
                    <p><i class="bi bi-check-circle me-2"></i>数据统计</p>
                </div>
            </div>
            <div class="col-md-7 login-right">
                <h3 class="mb-4">管理员登录</h3>
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">账号</label>
                        <input type="text" class="form-control" id="username" placeholder="请输入管理员账号" value="admin" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" placeholder="请输入密码" value="admin123" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">记住密码</label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-login w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i>登录
                    </button>
                    <div class="mt-3 text-center">
                        <a href="/" class="text-decoration-none">返回首页</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const API_BASE = '/api';
        
        // 保存token到localStorage
        function saveToken(token) {
            localStorage.setItem('adminToken', token);
            localStorage.setItem('isAdmin', 'true');
        }
        
        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await axios.post(`${API_BASE}/auth/login`, {
                    student_id: username,
                    password: password
                });
                
                if (res.data.token) {
                    saveToken(res.data.token);
                    localStorage.setItem('adminUser', JSON.stringify(res.data.user));
                    window.location.href = '/admin';
                }
            } catch (error) {
                alert(error.response?.data?.error || '登录失败，请检查账号密码');
            }
        });
    </script>
</body>
</html>
