<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书管理 - 图书馆后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 250px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 0;
            color: white;
        }
        .sidebar a { color: rgba(255,255,255,0.8); padding: 12px 20px; display: block; text-decoration: none; transition: all 0.3s; }
        .sidebar a:hover, .sidebar a.active { color: white; background: rgba(255,255,255,0.1); }
        .sidebar a i { margin-right: 10px; }
        .content { margin-left: 250px; padding: 20px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        
        /* 扫码模态框样式 */
        .scan-option-btn {
            width: 100%;
            padding: 25px 20px;
            font-size: 18px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            background: #fff;
            transition: all 0.3s;
        }
        .scan-option-btn:hover {
            border-color: #667eea;
            background: #f8f6ff;
            transform: translateY(-2px);
        }
        .scan-option-btn i { font-size: 32px; margin-bottom: 8px; }
        
        /* 扫码区域红色对准线 */
        .scanner-container {
            position: relative;
            display: inline-block;
        }
        .scanner-line {
            position: absolute;
            left: 10%;
            right: 10%;
            top: 50%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff3b3b, transparent);
            box-shadow: 0 0 8px #ff3b3b;
            z-index: 10;
            animation: scanLine 2s ease-in-out infinite;
        }
        @keyframes scanLine {
            0%, 100% { top: 30%; }
            50% { top: 70%; }
        }
        .scanner-frame {
            border: 3px solid rgba(255,59,59,0.5);
            border-radius: 8px;
        }
        
        /* 书名搜索结果样式 */
        .search-result-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .search-result-item:hover {
            background: #f8f6ff;
            border-color: #667eea;
        }
        .search-result-item img {
            width: 50px;
            height: 70px;
            object-fit: cover;
            border-radius: 4px;
            margin-right: 15px;
        }
        .search-result-item .book-info {
            flex: 1;
        }
        .search-result-item .book-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        .search-result-item .book-meta {
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>
    <script>if(!localStorage.getItem('adminToken'))window.location.href='/admin/login';</script>
    
    <div class="sidebar">
        <h4 class="px-3 mb-4"><i class="bi bi-book"></i> 图书馆管理</h4>
        <a href="/admin"><i class="bi bi-speedometer2"></i> 仪表盘</a>
        <a href="/admin/books" class="active"><i class="bi bi-book"></i> 图书管理</a>
        <a href="/admin/borrows"><i class="bi bi-arrow-left-right"></i> 借还管理</a>
        <a href="/admin/users"><i class="bi bi-people"></i> 读者管理</a>
        <a href="/admin/reservations"><i class="bi bi-calendar-check"></i> 预约管理</a>
        <a href="/admin/notices"><i class="bi bi-megaphone"></i> 公告管理</a>
        <a href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i> 退出</a>
    </div>
    
    <div class="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>图书管理</h2>
            <div>
                <button class="btn btn-primary" onclick="showAddModal()">
                    <i class="bi bi-plus-circle"></i> 添加图书
                </button>
                <button class="btn btn-outline-primary ms-2" onclick="showIsbnModal()">
                    <i class="bi bi-upc-scan"></i> ISBN扫码添加
                </button>
            </div>
        </div>
        
        <div class="card">
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-4">
                        <input type="text" class="form-control" id="searchKeyword" placeholder="搜索书名、作者、ISBN">
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="categoryFilter">
                            <option value="">全部分类</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-outline-secondary w-100" onclick="loadBooks()">
                            <i class="bi bi-search"></i> 搜索
                        </button>
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>封面</th>
                                <th>书名</th>
                                <th>作者</th>
                                <th>ISBN</th>
                                <th>分类</th>
                                <th>在架/总量</th>
                                <th>位置</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="booksTable">
                            <tr><td colspan="8" class="text-center text-muted py-4">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
                
                <nav>
                    <ul class="pagination justify-content-center" id="pagination"></ul>
                </nav>
            </div>
        </div>
    </div>
    
    <!-- ISBN扫码模态框 -->
    <div class="modal fade" id="scannerModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-upc-scan"></i> 添加图书</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" onclick="stopScanner()"></button>
                </div>
                <div class="modal-body">
                    <!-- 选项界面 -->
                    <div id="scanOptions" class="text-center">
                        <button class="scan-option-btn" onclick="startCameraScan()">
                            <i class="bi bi-camera-fill text-primary"></i><br>
                            <strong>摄像头扫码</strong>
                        </button>
                        <button class="scan-option-btn" onclick="showManualInput()">
                            <i class="bi bi-keyboard text-success"></i><br>
                            <strong>手动输入ISBN</strong>
                        </button>
                        <button class="scan-option-btn" onclick="showTitleSearch()">
                            <i class="bi bi-search text-warning"></i><br>
                            <strong>按书名搜索</strong>
                        </button>
                    </div>
                    
                    <!-- 摄像头扫码界面 -->
                    <div id="cameraScanArea" style="display:none;">
                        <!-- iframe提示：在Replit预览等iframe环境中无法使用摄像头 -->
                        <div id="iframeWarning" class="alert alert-info mb-3" style="display:none;">
                            <strong>提示：</strong>当前页面在嵌入窗口中，摄像头可能无法使用。<br>
                            <a id="newWindowLink" href="#" target="_blank" class="btn btn-sm btn-outline-primary mt-2">
                                在新窗口中打开此页面
                            </a>
                            <small class="d-block mt-1 text-muted">新窗口中摄像头扫码可正常使用</small>
                        </div>
                        <div class="text-center mb-2" id="scanHint">
                            <small class="text-muted">将条形码对准下方红色线条位置</small>
                        </div>
                        <div id="scanLoading" class="text-center py-4" style="display:none;">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-2 text-muted">正在启动摄像头...</p>
                        </div>
                        <div class="scanner-container" id="scannerContainer" style="display:none;">
                            <div id="isbnScanner" style="width:100%;min-height:300px;"></div>
                            <div class="scanner-line"></div>
                        </div>
                        <div id="scanResult" class="mt-3" style="display:none;">
                            <div class="alert alert-info mb-2">扫描到ISBN：<strong id="scannedIsbn"></strong></div>
                            <div id="scanBookInfo" class="small text-muted"></div>
                        </div>
                        <div id="scanError" class="alert alert-warning mt-2" style="display:none;">
                            <span id="scanErrorText"></span>
                            <a id="scanErrorNewWindow" href="#" target="_blank" class="btn btn-sm btn-outline-primary mt-2" style="display:none;">
                                在新窗口打开（推荐）
                            </a>
                        </div>
                        <div class="mt-3 text-center">
                            <button class="btn btn-secondary btn-sm" onclick="backToOptions()">← 返回选择</button>
                        </div>
                    </div>
                    
                    <!-- 手动输入界面 -->
                    <div id="manualInputArea" style="display:none;">
                        <div class="mb-3">
                            <label class="form-label">输入ISBN码</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="manualIsbn" placeholder="输入ISBN码，如：9787111213826">
                                <button class="btn btn-primary" onclick="queryManualIsbn()">查询</button>
                            </div>
                        </div>
                        <div id="manualResult" class="mt-3" style="display:none;">
                            <div class="alert alert-info mb-2">ISBN：<strong id="manualIsbnDisplay"></strong></div>
                            <div id="manualBookInfo" class="small text-muted"></div>
                        </div>
                        <div id="manualError" class="alert alert-warning mt-2" style="display:none;"></div>
                        <div class="mt-3 text-center">
                            <button class="btn btn-secondary btn-sm" onclick="backToOptions()">← 返回选择</button>
                        </div>
                    </div>
                    
                    <!-- 按书名搜索界面 -->
                    <div id="titleSearchArea" style="display:none;">
                        <div class="mb-3">
                            <label class="form-label">输入书名或关键词</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="searchKeywordInput" placeholder="输入书名或关键词">
                                <button class="btn btn-primary" onclick="doTitleSearch()">
                                    <i class="bi bi-search"></i> 搜索
                                </button>
                            </div>
                        </div>
                        <div id="searchResults" class="mt-3">
                            <small class="text-muted">输入关键词后点击搜索按钮</small>
                        </div>
                        <div class="mt-3 text-center">
                            <button class="btn btn-secondary btn-sm" onclick="backToOptions()">← 返回选择</button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer" id="scanModalFooter" style="display:none;">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" onclick="stopScanner()">关闭</button>
                    <button type="button" class="btn btn-primary" id="useScannedBtn" onclick="useScannedData()">
                        <i class="bi bi-check-circle"></i> 使用此信息添加
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑图书模态框 -->
    <div class="modal fade" id="bookModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">添加图书</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="bookForm">
                        <input type="hidden" id="bookId">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">ISBN</label>
                                <input type="text" class="form-control" id="isbn" placeholder="978-xxx-xxx-xxx">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">书名 *</label>
                                <input type="text" class="form-control" id="title" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">作者</label>
                                <input type="text" class="form-control" id="author">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">出版社</label>
                                <input type="text" class="form-control" id="publisher">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">出版日期</label>
                                <input type="date" class="form-control" id="publishDate">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">分类</label>
                                <select class="form-select" id="categoryId"></select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">馆藏位置</label>
                                <input type="text" class="form-control" id="location" placeholder="如：A-1-1">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">数量</label>
                                <input type="number" class="form-control" id="totalCount" value="1" min="1">
                            </div>
                            <div class="col-12">
                                <label class="form-label">封面URL</label>
                                <input type="url" class="form-control" id="coverUrl">
                            </div>
                            <div class="col-12">
                                <label class="form-label">简介</label>
                                <textarea class="form-control" id="description" rows="3"></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveBook()">保存</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>
        const API_BASE = '/api';
        const token = localStorage.getItem('adminToken');
        axios.defaults.headers.common['Authorization'] = `Bearer ${token}`;
        
        let bookModal, scannerModal, currentPage = 1;
        let html5QrCode = null;
        let selectedBookData = null;
        
        function logout(){localStorage.clear();window.location.href='/admin/login';}
        
        async function loadCategories(){
            const res = await axios.get(`${API_BASE}/books/categories`);
            const select = document.getElementById('categoryId');
            document.getElementById('categoryFilter').innerHTML = '<option value="">全部分类</option>';
            select.innerHTML = '<option value="">无分类</option>';
            res.data.categories.forEach(c => {
                select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
                document.getElementById('categoryFilter').innerHTML += `<option value="${c.id}">${c.name}</option>`;
            });
        }
        
        async function loadBooks(page = 1){
            currentPage = page;
            const keyword = document.getElementById('searchKeyword').value;
            const categoryId = document.getElementById('categoryFilter').value;
            
            let url = `${API_BASE}/books?page=${page}&page_size=10`;
            if(keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
            if(categoryId) url += `&category_id=${categoryId}`;
            
            const res = await axios.get(url);
            const {books, total, total_pages} = res.data;
            
            if(books.length === 0){
                document.getElementById('booksTable').innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">暂无数据</td></tr>';
            }else{
                let html = '';
                books.forEach(book => {
                    html += `<tr>
                        <td><img src="${book.cover_url || 'https://via.placeholder.com/50x70'}" style="width:50px;height:70px;object-fit:cover;border-radius:4px;"></td>
                        <td>${book.title}</td>
                        <td>${book.author || '-'}</td>
                        <td><code>${book.isbn || '-'}</code></td>
                        <td>${book.category_name || '-'}</td>
                        <td><span class="badge bg-${book.available_count > 0 ? 'success' : 'danger'}">${book.available_count}/${book.total_count}</span></td>
                        <td>${book.location || '-'}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="editBook(${book.id})"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteBook(${book.id})"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>`;
                });
                document.getElementById('booksTable').innerHTML = html;
            }
            
            // 分页
            let pageHtml = '';
            for(let i = 1; i <= total_pages; i++){
                pageHtml += `<li class="page-item ${i === page ? 'active' : ''}"><a class="page-link" href="#" onclick="loadBooks(${i});return false;">${i}</a></li>`;
            }
            document.getElementById('pagination').innerHTML = pageHtml;
        }
        
        function showAddModal(){
            document.getElementById('modalTitle').textContent = '添加图书';
            document.getElementById('bookForm').reset();
            document.getElementById('bookId').value = '';
            bookModal.show();
        }
        
        // ========== 扫码模态框相关函数 ==========
        
        function showIsbnModal(){
            selectedBookData = null;
            
            // 重置所有区域
            document.getElementById('scanOptions').style.display = 'block';
            document.getElementById('cameraScanArea').style.display = 'none';
            document.getElementById('manualInputArea').style.display = 'none';
            document.getElementById('titleSearchArea').style.display = 'none';
            document.getElementById('scanModalFooter').style.display = 'none';
            document.getElementById('scanResult').style.display = 'none';
            document.getElementById('scanError').style.display = 'none';
            document.getElementById('manualResult').style.display = 'none';
            document.getElementById('manualError').style.display = 'none';
            document.getElementById('searchResults').innerHTML = '<small class="text-muted">输入关键词后点击搜索按钮</small>';
            
            stopScanner();
            scannerModal = new bootstrap.Modal(document.getElementById('scannerModal'));
            scannerModal.show();
        }
        
        function backToOptions(){
            stopScanner();
            document.getElementById('scanOptions').style.display = 'block';
            document.getElementById('cameraScanArea').style.display = 'none';
            document.getElementById('manualInputArea').style.display = 'none';
            document.getElementById('titleSearchArea').style.display = 'none';
            document.getElementById('scanModalFooter').style.display = 'none';
            document.getElementById('scanResult').style.display = 'none';
            document.getElementById('scanError').style.display = 'none';
            document.getElementById('iframeWarning').style.display = 'none';
            document.getElementById('scanErrorNewWindow').style.display = 'none';
        }
        
        // 检测是否在iframe中
        function isInIframe(){
            try { return window.self !== window.top; } catch(e) { return true; }
        }

        function startCameraScan(){
            document.getElementById('scanOptions').style.display = 'none';
            document.getElementById('cameraScanArea').style.display = 'block';

            // 如果在iframe中，显示提示
            if(isInIframe()){
                const warning = document.getElementById('iframeWarning');
                const link = document.getElementById('newWindowLink');
                link.href = window.location.href;
                warning.style.display = 'block';
            }

            setTimeout(() => startScanner(), 300);
        }
        
        function showManualInput(){
            document.getElementById('scanOptions').style.display = 'none';
            document.getElementById('manualInputArea').style.display = 'block';
            document.getElementById('manualIsbn').value = '';
            document.getElementById('manualResult').style.display = 'none';
            document.getElementById('manualError').style.display = 'none';
        }
        
        function showTitleSearch(){
            document.getElementById('scanOptions').style.display = 'none';
            document.getElementById('titleSearchArea').style.display = 'block';
            document.getElementById('searchKeywordInput').value = '';
            document.getElementById('searchResults').innerHTML = '<small class="text-muted">输入关键词后点击搜索按钮</small>';
        }
        
        // 启动摄像头扫码
        async function startScanner(){
            stopScanner();
            
            const scannerEl = document.getElementById('isbnScanner');
            if(!scannerEl) return;
            scannerEl.innerHTML = '';

            // 显示loading，隐藏扫描区域
            document.getElementById('scanLoading').style.display = 'block';
            document.getElementById('scannerContainer').style.display = 'none';
            document.getElementById('scanHint').style.display = 'none';
            document.getElementById('scanError').style.display = 'none';
            
            html5QrCode = new Html5Qrcode("isbnScanner");
            
            try {
                // 直接用 facingMode 让库自己处理权限和设备选择
                await html5QrCode.start(
                    { facingMode: "environment" },
                    { 
                        fps: 20, 
                        qrbox: { width: 280, height: 120 }, 
                        formatsToSupport: [
                            Html5QrcodeSupportedFormats.EAN_13,
                            Html5QrcodeSupportedFormats.EAN_8,
                            Html5QrcodeSupportedFormats.CODE_128,
                            Html5QrcodeSupportedFormats.CODE_39,
                            Html5QrcodeSupportedFormats.UPC_A,
                            Html5QrcodeSupportedFormats.UPC_E
                        ]
                    },
                    onScanSuccess,
                    onScanFailure
                );
                // 启动成功，显示扫描区域
                document.getElementById('scanLoading').style.display = 'none';
                document.getElementById('scannerContainer').style.display = 'block';
                document.getElementById('scanHint').style.display = 'block';
            } catch(err) {
                console.error('摄像头启动失败:', err);
                document.getElementById('scanLoading').style.display = 'none';
                if(err.name === 'NotAllowedError' || (err.message && err.message.includes('Permission'))){
                    showCameraError('摄像头权限被拒绝，请点击浏览器地址栏左侧图标，允许摄像头访问后刷新页面重试');
                } else if(err.name === 'NotFoundError' || (err.message && err.message.includes('notFound'))){
                    showCameraError('未检测到摄像头设备');
                } else if(err.message && err.message.includes('secure context')){
                    showCameraError('需要在HTTPS环境下才能使用摄像头，请用HTTPS地址访问');
                } else {
                    showCameraError('摄像头启动失败：' + (err.message || err) + '。建议使用"手动输入ISBN"或"按书名搜索"');
                }
            }
        }

        function showCameraError(msg){
            const errDiv = document.getElementById('scanError');
            const errText = document.getElementById('scanErrorText');
            const errLink = document.getElementById('scanErrorNewWindow');
            errText.textContent = msg + '。建议使用"手动输入ISBN"或"按书名搜索"';
            if(isInIframe()){
                errLink.href = window.location.href;
                errLink.style.display = 'inline-block';
            }
            errDiv.style.display = 'block';
        }
        
        function stopScanner(){
            if(html5QrCode){
                html5QrCode.stop().catch(()=>{});
                html5QrCode = null;
            }
        }
        
        async function onScanSuccess(decodedText){
            stopScanner();
            
            let isbn = decodedText.replace(/[^0-9Xx]/g, '');
            if(isbn.length < 10){ return; }
            
            selectedBookData = { isbn: isbn };
            document.getElementById('scannedIsbn').textContent = isbn;
            document.getElementById('scanResult').style.display = 'block';
            document.getElementById('scanError').style.display = 'none';
            
            try {
                const res = await axios.get(`${API_BASE}/books/isbn/query?isbn=${isbn}`);
                if(res.data.success){
                    selectedBookData = {
                        isbn: isbn,
                        title: res.data.data.title || '',
                        author: res.data.data.author || '',
                        publisher: res.data.data.publisher || '',
                        publish_date: res.data.data.publish_date || '',
                        cover_url: res.data.data.cover_url || '',
                        description: res.data.data.description || ''
                    };
                    document.getElementById('scanBookInfo').innerHTML = 
                        `<strong>${res.data.data.title}</strong><br>作者：${res.data.data.author || '-'}<br>出版社：${res.data.data.publisher || '-'}`;
                } else {
                    document.getElementById('scanBookInfo').innerHTML = '<span class="text-warning">未查到图书信息，将手动填写</span>';
                }
            }catch(e){
                document.getElementById('scanBookInfo').innerHTML = '<span class="text-warning">查询失败，将手动填写</span>';
            }
            
            document.getElementById('scanModalFooter').style.display = 'flex';
        }
        
        function onScanFailure(){}
        
        // 手动输入ISBN查询
        async function queryManualIsbn(){
            const isbn = document.getElementById('manualIsbn').value.trim();
            if(!isbn) return;
            
            selectedBookData = { isbn: isbn };
            document.getElementById('manualIsbnDisplay').textContent = isbn;
            document.getElementById('manualResult').style.display = 'block';
            document.getElementById('manualError').style.display = 'none';
            
            try {
                const res = await axios.get(`${API_BASE}/books/isbn/query?isbn=${isbn}`);
                if(res.data.success){
                    selectedBookData = {
                        isbn: isbn,
                        title: res.data.data.title || '',
                        author: res.data.data.author || '',
                        publisher: res.data.data.publisher || '',
                        publish_date: res.data.data.publish_date || '',
                        cover_url: res.data.data.cover_url || '',
                        description: res.data.data.description || ''
                    };
                    document.getElementById('manualBookInfo').innerHTML = 
                        `<strong>${res.data.data.title}</strong><br>作者：${res.data.data.author || '-'}<br>出版社：${res.data.data.publisher || '-'}`;
                } else {
                    document.getElementById('manualBookInfo').innerHTML = '<span class="text-warning">未查到图书信息，将手动填写</span>';
                }
            }catch(e){
                document.getElementById('manualBookInfo').innerHTML = '<span class="text-warning">查询失败，将手动填写</span>';
            }
            
            document.getElementById('scanModalFooter').style.display = 'flex';
        }
        
        // 按书名搜索
        async function doTitleSearch(){
            const keyword = document.getElementById('searchKeywordInput').value.trim();
            if(!keyword){
                document.getElementById('searchResults').innerHTML = '<span class="text-warning">请输入搜索关键词</span>';
                return;
            }
            
            document.getElementById('searchResults').innerHTML = '<div class="text-center py-3"><span class="text-muted">搜索中...</span></div>';
            
            try {
                const res = await axios.get(`${API_BASE}/books/search?q=${encodeURIComponent(keyword)}`);
                
                if(res.data.results && res.data.results.length > 0){
                    let html = '';
                    res.data.results.forEach((book, index) => {
                        html += `<div class="search-result-item" onclick="selectSearchResult(${index})">
                            <img src="${book.cover_url || 'https://via.placeholder.com/50x70'}" alt="封面">
                            <div class="book-info">
                                <div class="book-title">${book.title || '未知书名'}</div>
                                <div class="book-meta">
                                    ${book.author ? '作者：' + book.author + ' | ' : ''}
                                    ${book.publisher ? '出版社：' + book.publisher : ''}
                                </div>
                            </div>
                        </div>`;
                    });
                    document.getElementById('searchResults').innerHTML = html;
                    
                    // 保存搜索结果供点击选择
                    window.searchResultsData = res.data.results;
                } else {
                    document.getElementById('searchResults').innerHTML = '<div class="alert alert-warning">未找到相关图书，请尝试其他关键词</div>';
                }
            }catch(e){
                document.getElementById('searchResults').innerHTML = '<div class="alert alert-danger">搜索失败，请重试</div>';
            }
        }
        
        // 选择搜索结果
        function selectSearchResult(index){
            const book = window.searchResultsData[index];
            if(!book) return;
            
            selectedBookData = {
                isbn: book.isbn || '',
                title: book.title || '',
                author: book.author || '',
                publisher: book.publisher || '',
                publish_date: book.publish_date || '',
                cover_url: book.cover_url || '',
                description: book.description || ''
            };
            
            // 关闭扫码模态框，打开添加表单
            scannerModal.hide();
            
            // 填充表单
            document.getElementById('modalTitle').textContent = '添加图书（自动填充）';
            document.getElementById('bookForm').reset();
            document.getElementById('bookId').value = '';
            document.getElementById('isbn').value = selectedBookData.isbn || '';
            document.getElementById('title').value = selectedBookData.title || '';
            document.getElementById('author').value = selectedBookData.author || '';
            document.getElementById('publisher').value = selectedBookData.publisher || '';
            document.getElementById('publishDate').value = selectedBookData.publish_date || '';
            document.getElementById('coverUrl').value = selectedBookData.cover_url || '';
            document.getElementById('description').value = selectedBookData.description || '';
            
            bookModal.show();
        }
        
        // 使用扫描/输入的ISBN数据
        function useScannedData(){
            stopScanner();
            scannerModal.hide();
            
            // 填充表单
            document.getElementById('modalTitle').textContent = '添加图书（ISBN自动填充）';
            document.getElementById('bookForm').reset();
            document.getElementById('bookId').value = '';
            
            if(selectedBookData){
                document.getElementById('isbn').value = selectedBookData.isbn || '';
                document.getElementById('title').value = selectedBookData.title || '';
                document.getElementById('author').value = selectedBookData.author || '';
                document.getElementById('publisher').value = selectedBookData.publisher || '';
                document.getElementById('publishDate').value = selectedBookData.publish_date || '';
                document.getElementById('coverUrl').value = selectedBookData.cover_url || '';
                document.getElementById('description').value = selectedBookData.description || '';
            }
            
            bookModal.show();
        }
        
        async function editBook(id){
            const res = await axios.get(`${API_BASE}/books/${id}`);
            const book = res.data.book;
            
            document.getElementById('modalTitle').textContent = '编辑图书';
            document.getElementById('bookId').value = book.id;
            document.getElementById('isbn').value = book.isbn;
            document.getElementById('title').value = book.title;
            document.getElementById('author').value = book.author;
            document.getElementById('publisher').value = book.publisher;
            document.getElementById('publishDate').value = book.publish_date;
            document.getElementById('categoryId').value = book.category_id || '';
            document.getElementById('location').value = book.location;
            document.getElementById('totalCount').value = book.total_count;
            document.getElementById('coverUrl').value = book.cover_url;
            document.getElementById('description').value = book.description;
            
            bookModal.show();
        }
        
        async function saveBook(){
            const id = document.getElementById('bookId').value;
            const data = {
                isbn: document.getElementById('isbn').value,
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                publisher: document.getElementById('publisher').value,
                publish_date: document.getElementById('publishDate').value,
                category_id: document.getElementById('categoryId').value || null,
                location: document.getElementById('location').value,
                total_count: parseInt(document.getElementById('totalCount').value),
                cover_url: document.getElementById('coverUrl').value,
                description: document.getElementById('description').value
            };
            
            try {
                if(id){
                    await axios.put(`${API_BASE}/books/${id}`, data);
                    alert('更新成功');
                }else{
                    data.available_count = data.total_count;
                    await axios.post(`${API_BASE}/books`, data);
                    alert('添加成功');
                }
                bookModal.hide();
                loadBooks(currentPage);
            }catch(e){
                alert(e.response?.data?.error || '保存失败');
            }
        }
        
        async function deleteBook(id){
            if(!confirm('确定要删除这本书吗？')) return;
            try {
                await axios.delete(`${API_BASE}/books/${id}`);
                alert('删除成功');
                loadBooks(currentPage);
            }catch(e){
                alert(e.response?.data?.error || '删除失败');
            }
        }
        
        document.addEventListener('DOMContentLoaded', async () => {
            bookModal = new bootstrap.Modal(document.getElementById('bookModal'));
            await loadCategories();
            loadBooks();
            
            document.getElementById('searchKeyword').addEventListener('keypress', e => {
                if(e.key === 'Enter') loadBooks();
            });
            
            // 书名搜索回车事件
            document.getElementById('searchKeywordInput').addEventListener('keypress', e => {
                if(e.key === 'Enter') doTitleSearch();
            });
            
            // ISBN输入回车事件
            document.getElementById('manualIsbn').addEventListener('keypress', e => {
                if(e.key === 'Enter') queryManualIsbn();
            });
        });
    </script>
</body>
</html>
