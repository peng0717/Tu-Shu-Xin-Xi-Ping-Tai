<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>读者管理 - 图书馆后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
        .sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: 250px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px 0; color: white; }
        .sidebar a { color: rgba(255,255,255,0.8); padding: 12px 20px; display: block; text-decoration: none; transition: all 0.3s; }
        .sidebar a:hover, .sidebar a.active { color: white; background: rgba(255,255,255,0.1); }
        .sidebar a i { margin-right: 10px; }
        .content { margin-left: 250px; padding: 20px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <script>if(!localStorage.getItem('adminToken'))window.location.href='/admin/login';</script>
    
    <div class="sidebar">
        <h4 class="px-3 mb-4"><i class="bi bi-book"></i> 图书馆管理</h4>
        <a href="/admin"><i class="bi bi-speedometer2"></i> 仪表盘</a>
        <a href="/admin/books"><i class="bi bi-book"></i> 图书管理</a>
        <a href="/admin/borrows"><i class="bi bi-arrow-left-right"></i> 借还管理</a>
        <a href="/admin/users" class="active"><i class="bi bi-people"></i> 读者管理</a>
        <a href="/admin/reservations"><i class="bi bi-calendar-check"></i> 预约管理</a>
        <a href="/admin/notices"><i class="bi bi-megaphone"></i> 公告管理</a>
        <a href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i> 退出</a>
    </div>
    
    <div class="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>读者管理</h2>
            <button class="btn btn-primary" onclick="showAddModal()">
                <i class="bi bi-person-plus"></i> 添加读者
            </button>
        </div>
        
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>学号</th>
                                <th>姓名</th>
                                <th>角色</th>
                                <th>联系电话</th>
                                <th>邮箱</th>
                                <th>借阅/上限</th>
                                <th>注册时间</th>
                            </tr>
                        </thead>
                        <tbody id="usersTable">
                            <tr><td colspan="7" class="text-center text-muted py-4">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 添加读者模态框 -->
    <div class="modal fade" id="userModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">添加读者</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="userForm">
                        <div class="mb-3">
                            <label class="form-label">学号 *</label>
                            <input type="text" class="form-control" id="studentId" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">姓名 *</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码 *</label>
                            <input type="password" class="form-control" id="password" value="123456" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">角色</label>
                            <select class="form-select" id="role">
                                <option value="student">学生</option>
                                <option value="teacher">教师</option>
                                <option value="admin">管理员</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">联系电话</label>
                            <input type="tel" class="form-control" id="phone">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">邮箱</label>
                            <input type="email" class="form-control" id="email">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveUser()">保存</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const API_BASE = '/api';
        const token = localStorage.getItem('adminToken');
        axios.defaults.headers.common['Authorization'] = `Bearer ${token}`;
        
        let userModal;
        
        function logout(){localStorage.clear();window.location.href='/admin/login';}
        
        async function loadUsers(){
            try {
                const res = await axios.get(`${API_BASE}/stats/user-borrows`);
                const users = res.data.user_stats || [];
                
                let html = '';
                if(users.length === 0){
                    document.getElementById('usersTable').innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">暂无数据</td></tr>';
                }else{
                    users.forEach(u => {
                        const roleBadge = {
                            admin: '<span class="badge bg-danger">管理员</span>',
                            teacher: '<span class="badge bg-info">教师</span>',
                            student: '<span class="badge bg-secondary">学生</span>'
                        };
                        html += `<tr>
                            <td><code>${u.student_id}</code></td>
                            <td>${u.name}</td>
                            <td>${roleBadge[u.role] || '-'}</td>
                            <td>${u.phone || '-'}</td>
                            <td>${u.email || '-'}</td>
                            <td><span class="text-primary">${u.current_borrows || 0}</span> / ${u.max_borrow || 5}</td>
                            <td>-</td>
                        </tr>`;
                    });
                    document.getElementById('usersTable').innerHTML = html;
                }
            }catch(e){
                console.error(e);
            }
        }
        
        function showAddModal(){
            document.getElementById('userForm').reset();
            document.getElementById('password').value = '123456';
            userModal.show();
        }
        
        async function saveUser(){
            const data = {
                student_id: document.getElementById('studentId').value,
                name: document.getElementById('name').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value
            };
            
            try {
                await axios.post(`${API_BASE}/auth/register`, data);
                alert('添加成功');
                userModal.hide();
                loadUsers();
            }catch(e){
                alert(e.response?.data?.error || '添加失败');
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            userModal = new bootstrap.Modal(document.getElementById('userModal'));
            loadUsers();
        });
    </script>
</body>
</html>
