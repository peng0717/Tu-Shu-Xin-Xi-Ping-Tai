<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 250px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 0;
            color: white;
        }
        .sidebar h4 { padding: 0 20px; margin-bottom: 30px; }
        .sidebar a {
            color: rgba(255,255,255,0.8);
            padding: 12px 20px;
            display: block;
            text-decoration: none;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            color: white;
            background: rgba(255,255,255,0.1);
        }
        .sidebar a i { margin-right: 10px; }
        .content { margin-left: 250px; padding: 20px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <script>
        // 检查登录状态
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = '/admin/login';
        }
    </script>
    
    <div class="sidebar">
        <h4><i class="bi bi-book"></i> 图书馆管理</h4>
        <a href="/admin"><i class="bi bi-speedometer2"></i> 仪表盘</a>
        <a href="/admin/books"><i class="bi bi-book"></i> 图书管理</a>
        <a href="/admin/borrows"><i class="bi bi-arrow-left-right"></i> 借还管理</a>
        <a href="/admin/users"><i class="bi bi-people"></i> 读者管理</a>
        <a href="/admin/reservations"><i class="bi bi-calendar-check"></i> 预约管理</a>
        <a href="/admin/notices"><i class="bi bi-megaphone"></i> 公告管理</a>
        <a href="/admin/stats"><i class="bi bi-bar-chart"></i> 统计报表</a>
        <a href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i> 退出登录</a>
    </div>
    
    <div class="content">
        <div class="container-fluid">
            <h2 class="mb-4">仪表盘</h2>
            
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card p-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted mb-2">图书总数</h6>
                                <h3 class="mb-0" id="totalBooks">-</h3>
                            </div>
                            <div class="icon bg-gradient-primary text-white" style="width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;">
                                <i class="bi bi-book"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card p-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted mb-2">当前借出</h6>
                                <h3 class="mb-0" id="lentBooks">-</h3>
                            </div>
                            <div class="icon bg-gradient-warning text-white" style="width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;">
                                <i class="bi bi-box-arrow-right"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card p-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted mb-2">读者总数</h6>
                                <h3 class="mb-0" id="totalUsers">-</h3>
                            </div>
                            <div class="icon bg-gradient-success text-white" style="width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;">
                                <i class="bi bi-people"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card p-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted mb-2">逾期未还</h6>
                                <h3 class="mb-0 text-danger" id="overdueCount">-</h3>
                            </div>
                            <div class="icon bg-gradient-danger text-white" style="width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;">
                                <i class="bi bi-exclamation-triangle"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header bg-white">
                            <h5 class="mb-0">借阅趋势（最近7天）</h5>
                        </div>
                        <div class="card-body" id="trendChart">
                            <div class="text-center text-muted py-5">加载中...</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header bg-white">
                            <h5 class="mb-0">逾期列表</h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr>
                                            <th>读者</th>
                                            <th>图书</th>
                                            <th>到期日</th>
                                        </tr>
                                    </thead>
                                    <tbody id="overdueList">
                                        <tr><td colspan="3" class="text-center text-muted py-4">加载中...</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const API_BASE = '/api';
        axios.defaults.headers.common['Authorization'] = `Bearer ${token}`;
        
        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('isAdmin');
            localStorage.removeItem('adminUser');
            window.location.href = '/admin/login';
        }
        
        async function loadDashboard() {
            try {
                const res = await axios.get(`${API_BASE}/stats/dashboard`);
                const stats = res.data;
                
                document.getElementById('totalBooks').textContent = stats.total_books;
                document.getElementById('lentBooks').textContent = stats.lent_books;
                document.getElementById('totalUsers').textContent = stats.total_users;
                document.getElementById('overdueCount').textContent = stats.overdue_count;
                
                // 借阅趋势
                const trendRes = await axios.get(`${API_BASE}/stats/borrow-trend`);
                const trend = trendRes.data.trend || [];
                
                let trendHtml = '<div class="row g-2">';
                trend.forEach(day => {
                    const maxVal = Math.max(...trend.map(d => Math.max(d.borrows, d.returns)), 1);
                    const borrowH = (day.borrows / maxVal) * 100 || 5;
                    const returnH = (day.returns / maxVal) * 100 || 5;
                    trendHtml += `<div class="col text-center">
                        <div style="height:100px;display:flex;align-items:flex-end;justify-content:center;gap:5px;">
                            <div style="width:20px;height:${borrowH}px;background:#667eea;border-radius:4px 4px 0 0;" title="借书:${day.borrows}"></div>
                            <div style="width:20px;height:${returnH}px;background:#38ef7d;border-radius:4px 4px 0 0;" title="还书:${day.returns}"></div>
                        </div>
                        <small class="text-muted">${day.date.slice(5)}</small>
                    </div>`;
                });
                trendHtml += '</div>';
                document.getElementById('trendChart').innerHTML = trendHtml;
                
                // 逾期列表
                const overdueRes = await axios.get(`${API_BASE}/stats/overdue-list`);
                const overdueList = overdueRes.data.overdue_list || [];
                
                if (overdueList.length === 0) {
                    document.getElementById('overdueList').innerHTML = '<tr><td colspan="3" class="text-center text-muted py-4"><i class="bi bi-check-circle me-2"></i>暂无逾期记录</td></tr>';
                } else {
                    let html = '';
                    overdueList.forEach(item => {
                        html += `<tr>
                            <td>${item.name}</td>
                            <td>${item.title}</td>
                            <td><span class="text-danger">${item.due_date}</span></td>
                        </tr>`;
                    });
                    document.getElementById('overdueList').innerHTML = html;
                }
                
            } catch (error) {
                console.error('加载失败:', error);
                if (error.response?.status === 401) {
                    logout();
                }
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
