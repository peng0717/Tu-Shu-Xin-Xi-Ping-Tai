<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约管理 - 图书馆后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
        .sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: 250px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px 0; color: white; }
        .sidebar a { color: rgba(255,255,255,0.8); padding: 12px 20px; display: block; text-decoration: none; transition: all 0.3s; }
        .sidebar a:hover, .sidebar a.active { color: white; background: rgba(255,255,255,0.1); }
        .sidebar a i { margin-right: 10px; }
        .content { margin-left: 250px; padding: 20px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; }
        .status-waiting { background: #fff3e0; color: #ef6c00; }
        .status-ready { background: #e8f5e9; color: #2e7d32; }
        .status-cancelled { background: #eceff1; color: #546e7a; }
    </style>
</head>
<body>
    <script>if(!localStorage.getItem('adminToken'))window.location.href='/admin/login';</script>
    
    <div class="sidebar">
        <h4 class="px-3 mb-4"><i class="bi bi-book"></i> 图书馆管理</h4>
        <a href="/admin"><i class="bi bi-speedometer2"></i> 仪表盘</a>
        <a href="/admin/books"><i class="bi bi-book"></i> 图书管理</a>
        <a href="/admin/borrows"><i class="bi bi-arrow-left-right"></i> 借还管理</a>
        <a href="/admin/users"><i class="bi bi-people"></i> 读者管理</a>
        <a href="/admin/reservations" class="active"><i class="bi bi-calendar-check"></i> 预约管理</a>
        <a href="/admin/notices"><i class="bi bi-megaphone"></i> 公告管理</a>
        <a href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i> 退出</a>
    </div>
    
    <div class="content">
        <h2 class="mb-4">预约管理</h2>
        
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h6 class="text-muted">待处理预约</h6>
                    <h2 id="waitingCount">-</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h6 class="text-muted">已通知取书</h6>
                    <h2 class="text-success" id="readyCount">-</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h6 class="text-muted">已取消/过期</h6>
                    <h2 class="text-secondary" id="otherCount">-</h2>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>读者</th>
                                <th>学号</th>
                                <th>图书</th>
                                <th>ISBN</th>
                                <th>预约时间</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="reservationsTable">
                            <tr><td colspan="7" class="text-center text-muted py-4">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const API_BASE = '/api';
        const token = localStorage.getItem('adminToken');
        axios.defaults.headers.common['Authorization'] = `Bearer ${token}`;
        
        function logout(){localStorage.clear();window.location.href='/admin/login';}
        
        async function loadReservations(){
            try {
                const res = await axios.get(`${API_BASE}/reservation/all`);
                const reservations = res.data.reservations || [];
                
                let waiting = 0, ready = 0, other = 0;
                
                let html = '';
                if(reservations.length === 0){
                    document.getElementById('reservationsTable').innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">暂无预约记录</td></tr>';
                }else{
                    reservations.forEach(r => {
                        if(r.status === 'waiting') waiting++;
                        else if(r.status === 'ready') ready++;
                        else other++;
                        
                        let statusBadge = '', actionBtn = '';
                        if(r.status === 'waiting'){
                            statusBadge = '<span class="status-badge status-waiting">等待到书</span>';
                            actionBtn = `<button class="btn btn-sm btn-success" onclick="notifyReady(${r.id})"><i class="bi bi-bell"></i> 通知取书</button>`;
                        }else if(r.status === 'ready'){
                            statusBadge = '<span class="status-badge status-ready">待取书</span>';
                        }else{
                            statusBadge = `<span class="status-badge status-cancelled">${r.status === 'cancelled' ? '已取消' : '已过期'}</span>`;
                        }
                        
                        html += `<tr>
                            <td>${r.user_name}</td>
                            <td><code>${r.student_id}</code></td>
                            <td>${r.title}</td>
                            <td><code>${r.isbn || '-'}</code></td>
                            <td>${r.reserve_date?.slice(0, 10) || '-'}</td>
                            <td>${statusBadge}</td>
                            <td>${actionBtn}</td>
                        </tr>`;
                    });
                    document.getElementById('reservationsTable').innerHTML = html;
                }
                
                document.getElementById('waitingCount').textContent = waiting;
                document.getElementById('readyCount').textContent = ready;
                document.getElementById('otherCount').textContent = other;
            }catch(e){
                console.error(e);
            }
        }
        
        async function notifyReady(reservationId){
            try {
                await axios.post(`${API_BASE}/reservation/notify-ready`, {reservation_id: reservationId});
                alert('已通知读者取书');
                loadReservations();
            }catch(e){
                alert(e.response?.data?.error || '操作失败');
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadReservations);
    </script>
</body>
</html>
