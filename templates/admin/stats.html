<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计报表 - 图书馆后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
        .sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: 250px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px 0; color: white; }
        .sidebar a { color: rgba(255,255,255,0.8); padding: 12px 20px; display: block; text-decoration: none; transition: all 0.3s; }
        .sidebar a:hover, .sidebar a.active { color: white; background: rgba(255,255,255,0.1); }
        .sidebar a i { margin-right: 10px; }
        .content { margin-left: 250px; padding: 20px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <script>if(!localStorage.getItem('adminToken'))window.location.href='/admin/login';</script>
    
    <div class="sidebar">
        <h4 class="px-3 mb-4"><i class="bi bi-book"></i> 图书馆管理</h4>
        <a href="/admin"><i class="bi bi-speedometer2"></i> 仪表盘</a>
        <a href="/admin/books"><i class="bi bi-book"></i> 图书管理</a>
        <a href="/admin/borrows"><i class="bi bi-arrow-left-right"></i> 借还管理</a>
        <a href="/admin/users"><i class="bi bi-people"></i> 读者管理</a>
        <a href="/admin/reservations"><i class="bi bi-calendar-check"></i> 预约管理</a>
        <a href="/admin/notices"><i class="bi bi-megaphone"></i> 公告管理</a>
        <a href="/admin/stats" class="active"><i class="bi bi-bar-chart"></i> 统计报表</a>
        <a href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i> 退出</a>
    </div>
    
    <div class="content">
        <h2 class="mb-4">统计报表</h2>
        
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <div class="text-primary mb-2"><i class="bi bi-book fs-1"></i></div>
                    <h3 id="totalBooks">-</h3>
                    <p class="text-muted mb-0">图书总数</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <div class="text-success mb-2"><i class="bi bi-people fs-1"></i></div>
                    <h3 id="totalUsers">-</h3>
                    <p class="text-muted mb-0">注册读者</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <div class="text-warning mb-2"><i class="bi bi-arrow-left-right fs-1"></i></div>
                    <h3 id="totalBorrows">-</h3>
                    <p class="text-muted mb-0">总借阅量</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <div class="text-danger mb-2"><i class="bi bi-exclamation-triangle fs-1"></i></div>
                    <h3 id="overdueCount">-</h3>
                    <p class="text-muted mb-0">逾期未还</p>
                </div>
            </div>
        </div>
        
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">借阅趋势（最近7天）</h5>
                    </div>
                    <div class="card-body" id="trendChart">
                        <div class="text-center text-muted py-5">加载中...</div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">热门图书 TOP 10</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover table-sm mb-0">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>书名</th>
                                        <th>借阅次数</th>
                                        <th>在架</th>
                                    </tr>
                                </thead>
                                <tbody id="hotBooksTable">
                                    <tr><td colspan="4" class="text-center text-muted py-3">加载中...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row g-4 mt-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">借阅排行 TOP 10</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover table-sm mb-0">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>读者</th>
                                        <th>角色</th>
                                        <th>总借阅</th>
                                        <th>当前借阅</th>
                                    </tr>
                                </thead>
                                <tbody id="userRankTable">
                                    <tr><td colspan="5" class="text-center text-muted py-3">加载中...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">逾期列表</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover table-sm mb-0">
                                <thead>
                                    <tr>
                                        <th>读者</th>
                                        <th>图书</th>
                                        <th>到期日</th>
                                    </tr>
                                </thead>
                                <tbody id="overdueTable">
                                    <tr><td colspan="3" class="text-center text-muted py-3">加载中...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const API_BASE = '/api';
        const token = localStorage.getItem('adminToken');
        axios.defaults.headers.common['Authorization'] = `Bearer ${token}`;
        
        function logout(){localStorage.clear();window.location.href='/admin/login';}
        
        async function loadStats(){
            try {
                // 仪表盘统计
                const dashRes = await axios.get(`${API_BASE}/stats/dashboard`);
                document.getElementById('totalBooks').textContent = dashRes.data.total_books;
                document.getElementById('totalUsers').textContent = dashRes.data.total_users;
                document.getElementById('overdueCount').textContent = dashRes.data.overdue_count;
                
                // 借阅趋势
                const trendRes = await axios.get(`${API_BASE}/stats/borrow-trend?days=7`);
                const trend = trendRes.data.trend || [];
                let totalBorrows = trend.reduce((sum, d) => sum + d.borrows, 0);
                document.getElementById('totalBorrows').textContent = totalBorrows;
                
                let trendHtml = '<div class="d-flex align-items-end justify-content-around" style="height:150px;">';
                const maxVal = Math.max(...trend.map(d => Math.max(d.borrows, d.returns)), 1);
                trend.forEach(day => {
                    const borrowH = (day.borrows / maxVal) * 120;
                    const returnH = (day.returns / maxVal) * 120;
                    trendHtml += `<div class="text-center">
                        <div class="d-flex gap-1 align-items-end justify-content-center" style="height:120px;">
                            <div style="width:18px;height:${borrowH}px;background:#667eea;border-radius:3px 3px 0 0;"></div>
                            <div style="width:18px;height:${returnH}px;background:#38ef7d;border-radius:3px 3px 0 0;"></div>
                        </div>
                        <small class="text-muted">${day.date.slice(5)}</small>
                    </div>`;
                });
                trendHtml += '</div>';
                trendHtml += '<div class="text-center mt-2"><span class="me-3"><span style="display:inline-block;width:12px;height:12px;background:#667eea;border-radius:2px;"></span> 借书</span><span><span style="display:inline-block;width:12px;height:12px;background:#38ef7d;border-radius:2px;"></span> 还书</span></div>';
                document.getElementById('trendChart').innerHTML = trendHtml;
                
                // 热门图书
                const hotRes = await axios.get(`${API_BASE}/stats/hot-books?limit=10`);
                let hotHtml = '';
                hotRes.data.hot_books?.forEach((book, i) => {
                    hotHtml += `<tr>
                        <td>${i + 1}</td>
                        <td>${book.title}</td>
                        <td><span class="badge bg-primary">${book.borrow_count}</span></td>
                        <td>${book.available_count}/${book.total_count}</td>
                    </tr>`;
                });
                document.getElementById('hotBooksTable').innerHTML = hotHtml || '<tr><td colspan="4" class="text-center text-muted py-3">暂无数据</td></tr>';
                
                // 用户排行
                const userRes = await axios.get(`${API_BASE}/stats/user-borrows`);
                let userHtml = '';
                userRes.data.user_stats?.slice(0, 10).forEach((u, i) => {
                    const roleBadge = {admin:'bg-danger', teacher:'bg-info', student:'bg-secondary'};
                    userHtml += `<tr>
                        <td>${i + 1}</td>
                        <td>${u.name}</td>
                        <td><span class="badge ${roleBadge[u.role] || 'bg-secondary'}">${u.role === 'admin' ? '管理员' : u.role === 'teacher' ? '教师' : '学生'}</span></td>
                        <td>${u.total_borrows}</td>
                        <td>${u.current_borrows}</td>
                    </tr>`;
                });
                document.getElementById('userRankTable').innerHTML = userHtml || '<tr><td colspan="5" class="text-center text-muted py-3">暂无数据</td></tr>';
                
                // 逾期列表
                const overdueRes = await axios.get(`${API_BASE}/stats/overdue-list`);
                let overdueHtml = '';
                overdueRes.data.overdue_list?.forEach(item => {
                    overdueHtml += `<tr>
                        <td>${item.name}</td>
                        <td>${item.title}</td>
                        <td class="text-danger">${item.due_date?.slice(0, 10)}</td>
                    </tr>`;
                });
                document.getElementById('overdueTable').innerHTML = overdueHtml || '<tr><td colspan="3" class="text-center text-muted py-3">暂无逾期记录</td></tr>';
                
            }catch(e){
                console.error(e);
                if(e.response?.status === 401) logout();
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadStats);
    </script>
</body>
</html>
